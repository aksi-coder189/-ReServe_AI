    <!-- QRCode.js — generates a scannable tracking code per dispatch -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ---- LIGHT MODE OVERRIDES (toggled via <html class="light">) ---- */
        html.light body { background: #f1f5f9 !important; color: #0f172a !important; }
        html.light .bg-slate-950 { background-color: #f1f5f9 !important; }
        html.light .bg-slate-900, html.light .bg-slate-900\/80 { background-color: #ffffff !important; }
        html.light .bg-slate-900\/50, html.light .bg-slate-950\/40, html.light .bg-slate-950\/60, html.light .bg-slate-950\/70 { background-color: #e2e8f0 !important; }
        html.light .border-slate-800, html.light .border-slate-800\/60 { border-color: #cbd5e1 !important; }
        html.light .text-white { color: #0f172a !important; }
        html.light .text-slate-300, html.light .text-slate-400 { color: #334155 !important; }
        html.light .text-slate-500, html.light .text-slate-600 { color: #64748b !important; }
        html.light .bg-slate-950 input, html.light .bg-slate-950 textarea, html.light .bg-slate-950 select { color: #0f172a; }
        /* ---- TOAST NOTIFICATIONS ---- */
        #toastStack { position: fixed; top: 1rem; right: 1rem; z-index: 10000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
        .toast-item {
            pointer-events: auto;
            min-width: 260px; max-width: 340px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(16, 185, 129, 0.35);
            backdrop-filter: blur(10px);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            box-shadow: 0 8px 28px rgba(0,0,0,0.45), 0 0 0 1px rgba(16,185,129,0.06);
            font-size: 0.72rem;
            color: #e2e8f0;
            animation: toastIn 0.28s ease-out;
        }
        .toast-item.leaving { animation: toastOut 0.25s ease-in forwards; }
        @keyframes toastIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(30px); opacity: 0; } }
        /* ---- GLOW / GLASS HOVER for premium cards ---- */
        .glass-card { transition: box-shadow .25s ease, transform .25s ease, border-color .25s ease; }
        .glass-card:hover { box-shadow: 0 0 0 1px rgba(20,184,166,0.25), 0 12px 40px -12px rgba(20,184,166,0.35); transform: translateY(-2px); }
        /* ---- Live pipeline agent node ---- */
        .agent-node { transition: all .35s ease; opacity: 0.35; }
        .agent-node.active { opacity: 1; }
        .agent-node.done { opacity: 1; }
        .pulse-dot { animation: pulseDot 1.1s infinite ease-in-out; }
        @keyframes pulseDot { 0%, 100% { opacity: .4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.15); } }
        /* ---- Console-style live log ---- */
        #liveLogConsole { font-family: 'Space Mono', monospace; font-size: 10.5px; line-height: 1.6; }
        #liveLogConsole .log-line { opacity: 0; animation: logFadeIn .3s ease forwards; }
        @keyframes logFadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <style>
        body {
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
        }
        /* Fixed & Optimized Custom Hardware Cursor Framework */
        .custom-cursor-dot, .custom-cursor-ring {
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            mix-blend-mode: screen;
            opacity: 0;
            will-change: transform;
        }
        .custom-cursor-dot {
            transition: opacity 0.2s ease;
        }
        .custom-cursor-ring {
            transition: transform 0.08s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s ease;
        }
        html:hover .custom-cursor-dot, html:hover .custom-cursor-ring {
            opacity: 1;
        }
        /* Prevent disappearing on interactive frames */
        html, body, a, button, textarea, input, select, label {
            cursor: none !important;
        }
        /* Dark-theme tile filter so the real Leaflet map matches the app's slate/emerald palette */
        .leaflet-tile-pane {
            filter: invert(1) hue-rotate(180deg) brightness(0.92) contrast(0.9) saturate(0.8);
        }
        .leaflet-container {
            background: #020617;
        }
        .leaflet-control-attribution {
            background: rgba(2, 6, 23, 0.7) !important;
            color: #64748b !important;
            font-size: 9px !important;
        }
        .leaflet-control-attribution a { color: #10b981 !important; }
        .leaflet-control-zoom a {
            background: #0f172a !important;
            color: #10b981 !important;
            border-color: #1e293b !important;
        }
    </style>

<body class="bg-slate-950 text-white min-h-screen relative selection:bg-emerald-500/30">

    <!-- 1. CORE COMPONENT: GLOWING PARTICLE CANVAS BACKGROUND -->
    <canvas id="glowCanvas" class="fixed top-0 left-0 -z-10 block w-full h-full"></canvas>

    <!-- 2. UPGRADED CUSTOM CURSOR HARNESS -->
    <div id="cursorDot" class="custom-cursor-dot w-2 h-2 bg-emerald-400 rounded-full"></div>
    <div id="cursorRing" class="custom-cursor-ring w-7 h-7 border border-emerald-500/50 rounded-full"></div>

    <!-- TOAST NOTIFICATION STACK -->
    <div id="toastStack"></div>

    <!-- DARK / LIGHT MODE TOGGLE -->
    <button onclick="toggleTheme()" id="themeToggleBtn" title="Toggle dark / light mode" class="fixed bottom-5 right-5 z-[9998] w-11 h-11 rounded-full bg-slate-900/90 border border-slate-700 backdrop-blur flex items-center justify-center text-lg hover:border-emerald-500/60 transition-colors cursor-none">🌙</button>

    <!-- LIVE NOTIFICATIONS (from GET /notifications) -->
    <button onclick="toggleNotifications()" id="notifBellBtn" title="Notifications" class="fixed bottom-5 right-20 z-[9998] w-11 h-11 rounded-full bg-slate-900/90 border border-slate-700 backdrop-blur flex items-center justify-center text-lg hover:border-emerald-500/60 transition-colors cursor-none">
        🔔
        <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center"></span>
    </button>
    <div id="notifPanel" class="hidden fixed bottom-20 right-5 z-[9998] w-72 max-h-80 overflow-y-auto bg-slate-900/95 border border-slate-700 rounded-xl backdrop-blur p-3 space-y-2 shadow-2xl"></div>

    <!-- MAIN APP ROUTER CONTAINER -->
    <main id="app-root" class="w-full min-h-screen"></main>

    <script>
        // =========================================================================
        // PARTICLE BACKGROUND ENGINE
        // =========================================================================
        const canvas = document.getElementById('glowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(16, 185, 129, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // =========================================================================
        // IMMERSIVE GLITCH-FREE CURSOR SYSTEM
        // =========================================================================
        const dot = document.getElementById('cursorDot');
        const ring = document.getElementById('cursorRing');
        let mouseX = 0, mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            dot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            ring.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            
            if(dot.style.opacity === '0') {
                dot.style.opacity = '1';
                ring.style.opacity = '1';
            }

        const API_BASE = '';

        async function apiGet(path) {
            const res = await fetch(API_BASE + path);
            if (!res.ok) throw new Error(`GET ${path} failed: ${res.status}`);
            return res.json();
        }
        async function apiPost(path, body) {
            const res = await fetch(API_BASE + path, {
                method: 'POST',
                headers: body !== undefined ? { 'Content-Type': 'application/json' } : {},
                body: body !== undefined ? JSON.stringify(body) : undefined
            });
            if (!res.ok) {
                // FastAPI sends {"detail": "..."} on HTTPException (e.g. "Email already exists",
                // "Invalid Credentials") — surface that instead of a bare status code.
                let detail = `${res.status}`;
                try {
                    const errBody = await res.json();
                    if (errBody && errBody.detail) detail = errBody.detail;
                } catch (_) { /* body wasn't JSON — fall back to the status code */ }
                throw new Error(detail);
            }
            return res.json();
        }

        // --- Food Safety Vision Agent (client-side heuristic scan — no external vision API is wired up) ---
        function handleFoodImageUpload(input) {
            const file = input.files && input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                state.foodPhotoDataUrl = e.target.result;
                state.freshnessResult = null;
                renderApp();
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = 60; c.height = 60;
                    const cx = c.getContext('2d');
                    cx.drawImage(img, 0, 0, 60, 60);
                    const data = cx.getImageData(0, 0, 60, 60).data;
                    let rSum = 0, gSum = 0, bSum = 0, brightSum = 0;
                    const n = data.length / 4;
                    for (let i = 0; i < data.length; i += 4) {
                        rSum += data[i]; gSum += data[i + 1]; bSum += data[i + 2];
                        brightSum += (data[i] + data[i + 1] + data[i + 2]) / 3;
                    }
                    const avgBright = brightSum / n;
                    const greenRatio = (gSum / n) / ((rSum / n) + (gSum / n) + (bSum / n) + 1);
                    // Heuristic freshness score — brighter, more saturated, greener images score higher.
                    // This is a stand-in signal, not a real spoilage classifier.
                    let score = Math.round(Math.min(97, Math.max(40, avgBright * 0.55 + greenRatio * 120)));
                    const consumeHours = score > 80 ? 6 : score > 60 ? 3 : 1;
                    state.freshnessResult = {
                        score, safe: score >= 55,
                        consumeHours,
                        note: score >= 80 ? 'Looks freshly prepared — vivid color, good lighting signature.' : score >= 55 ? 'Acceptable condition — recommend prioritizing pickup.' : 'Low visual freshness signal — flag for manual NGO review before dispatch.'
                    };
                    renderApp();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function haversineKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        // NOTE: parseWhatsappSurplus / runMatchingAgent / runDispatchAgent below are no longer
        // called by the live pipeline (runMockPipeline now POSTs to /pipeline/run and uses the
        // backend's real answer). Kept only as a reference/offline fallback for predictHotspot().
        // --- Step 1: Rule-Based NLP Extraction (mirrors parse_whatsapp_surplus's Contextual Anchoring Regex) ---
        function parseWhatsappSurplus(messageText, currentGps, spoilOverrideHours) {
            const textLower = messageText.toLowerCase();
            let quantity = 30;
            let extractedFood = "Unspecified Food";

            const extractionPattern = /(\d+)\s*(plates|servings|serves|kg|boxes|portions|meals|containers|packets|trays)\s*(?:of\s+)?(.*?)(?=\s+(?:remaining|left|ready|from|extra|now|need|urgent|please)|\.|,|;|$)/i;
            const match = textLower.match(extractionPattern);

            if (match) {
                quantity = parseInt(match[1], 10);
                const rawFood = match[3].trim();
                if (rawFood) extractedFood = rawFood.replace(/\b\w/g, c => c.toUpperCase());
            }

            let spoilHours = spoilOverrideHours || 4;
            if (!spoilOverrideHours) {
                if (textLower.includes('urgent')) spoilHours = 2;
                else if (textLower.includes('now') || textLower.includes('tonight')) spoilHours = 3;
            }

            return {
                food_type: extractedFood,
                quantity_servings: quantity,
                time_to_spoil_hours: spoilHours,
                location_lat: currentGps ? currentGps.lat : 28.7041,
                location_lon: currentGps ? currentGps.lon : 77.1025
            };
        }

        // --- Step 2: Matching Agent (mirrors the Groq MatchDecision schema logic) ---
        function runMatchingAgent(surplusData, ngos) {
            const eligible = ngos.filter(n => n.accepts_cooked && n.capacity_servings >= surplusData.quantity_servings);
            const pool = eligible.length ? eligible : ngos;

            let best = null;
            let bestDist = Infinity;
            pool.forEach(n => {
                const d = haversineKm(surplusData.location_lat, surplusData.location_lon, n.lat, n.lon);
                if (d < bestDist) { bestDist = d; best = n; }
            });

            const matchFound = eligible.length > 0;
            const urgency = surplusData.time_to_spoil_hours <= 2 ? 'High' : surplusData.time_to_spoil_hours <= 4 ? 'Medium' : 'Low';
            const marginRatio = matchFound ? Math.min(1, (best.capacity_servings - surplusData.quantity_servings) / best.capacity_servings) : 0;
            const proximityBonus = matchFound ? Math.max(0, (5 - bestDist)) * 0.02 : 0;
            const confidence = matchFound ? Math.min(0.98, 0.6 + marginRatio * 0.3 + proximityBonus) : 0.15;

            const reasoning = matchFound
                ? `${best.name} accepts cooked meals and holds ${best.capacity_servings} servings of free capacity against this ${surplusData.quantity_servings}-serving payload, sitting only ${bestDist.toFixed(2)} km from pickup — the closest node with sufficient headroom.`
                : `No NGO node currently has enough free capacity (need ${surplusData.quantity_servings} servings) — closest is ${best ? best.name : 'none'} at ${best ? best.capacity_servings : 0} servings. Escalating for manual review.`;

            return {
                match_found: matchFound,
                best_ngo_id: matchFound ? best.ngo_id : '',
                best_ngo_name: matchFound ? best.name : '',
                confidence_score: Number(confidence.toFixed(2)),
                reasoning,
                dispatch_urgency: urgency,
                distance_km: Number(bestDist.toFixed(2))
            };
        }

        // --- Step 3: Volunteer Dispatch Agent (mirrors DispatchDecision — bike ≤30, car ≤150) ---
        function runDispatchAgent(surplusData, urgency, volunteers) {
            const eligible = volunteers.filter(v => v.capacity >= surplusData.quantity_servings);
            const pool = eligible.length ? eligible : volunteers;

            let best = null;
            let bestDist = Infinity;
            pool.forEach(v => {
                const d = haversineKm(surplusData.location_lat, surplusData.location_lon, v.lat, v.lon);
                if (d < bestDist) { bestDist = d; best = v; }
            });

            const urgencyPadding = urgency === 'High' ? 0 : urgency === 'Medium' ? 2 : 4;
            const etaMins = Math.max(4, Math.round((bestDist / best.speedKmph) * 60) + urgencyPadding);

            const reasoning = eligible.length
                ? `${best.name}'s ${best.vehicle} can carry ${best.capacity} servings, well within range, and is only ${bestDist.toFixed(2)} km from the surplus location — fastest viable pickup.`
                : `No vehicle has full ${surplusData.quantity_servings}-serving capacity; assigning ${best.name} (${best.vehicle}) for a partial / multi-trip pickup as the nearest option.`;

            return {
                assigned_volunteer_id: best.vol_id,
                assigned_volunteer_name: best.name,
                vehicle_type: best.vehicle,
                estimated_pickup_mins: etaMins,
                reasoning,
                distance_km: Number(bestDist.toFixed(2))
            };
        }

        // --- Predictive Forecast Module (mirrors the RandomForestRegressor React API handoff) ---
        function predictHotspot(neighborhood, hour, isWeekend, isRaining) {
            let val = 30 * NEIGHBORHOOD_BASE[neighborhood];
            if (hour >= 18 && hour <= 22) val += 15;
            if (isWeekend) val += 35;
            if (isRaining) val += 20;
            const predicted = Math.round(val);
            const severity = Math.min(Math.round((predicted / 120) * 100), 100);
            return {
                neighborhood,
                predicted_servings: predicted,
                hotspot_severity_percent: severity,
                recommended_action: severity > 60 ? 'Pre-stage volunteers' : 'Monitor'
            };
        }

        // --- Real Live Map (Leaflet + OpenStreetMap tiles) ---
        function initDispatchMap(pipelineData) {
            const mapEl = document.getElementById('dispatchMap');
            if (!mapEl || typeof L === 'undefined') return;

            if (dispatchMapInstance) {
                dispatchMapInstance.remove();
                dispatchMapInstance = null;

            const vol = FLEET_VOLUNTEERS.find(v => v.vol_id === pipelineData.assigned_volunteer);
            const origin = [pipelineData.location_lat, pipelineData.location_lon];

            dispatchMapInstance = L.map('dispatchMap', { attributionControl: true }).setView(origin, 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18,
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(dispatchMapInstance);

            const makeDot = (color, size) => L.divIcon({
                className: '',
                html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid white;border-radius:50%;box-shadow:0 0 8px ${color};"></div>`,
                iconSize: [size, size]
            });

            const bounds = [origin];
            L.marker(origin, { icon: makeDot('#ef4444', 16) }).addTo(dispatchMapInstance).bindPopup('<b>Surplus Origin</b><br>' + pipelineData.food_type);

            if (ngo) {
                bounds.push([ngo.lat, ngo.lon]);
                L.marker([ngo.lat, ngo.lon], { icon: makeDot('#10b981', 16) }).addTo(dispatchMapInstance).bindPopup('<b>' + ngo.name + '</b><br>Capacity: ' + ngo.capacity_servings + ' servings');
                L.polyline([origin, [ngo.lat, ngo.lon]], { color: '#10b981', weight: 3, dashArray: '8,6', opacity: 0.8 }).addTo(dispatchMapInstance);
            }
            if (vol) {
                bounds.push([vol.lat, vol.lon]);
                L.marker([vol.lat, vol.lon], { icon: makeDot('#38bdf8', 13) }).addTo(dispatchMapInstance).bindPopup('<b>' + vol.name + '</b><br>' + vol.vehicle + ' · ' + vol.capacity + ' servings capacity');
                L.polyline([origin, [vol.lat, vol.lon]], { color: '#38bdf8', weight: 2, dashArray: '4,5', opacity: 0.7 }).addTo(dispatchMapInstance);
            }

            if (bounds.length > 1) dispatchMapInstance.fitBounds(bounds, { padding: [40, 40] });
            setTimeout(() => { if (dispatchMapInstance) dispatchMapInstance.invalidateSize(); }, 150);
        }

        let state = getDefaultState();

        function navigateTo(path, updates = {}) {
            if (path === '/') {
                state = getDefaultState(); // Hard reset state upon system homepage return
            } else {
                state.currentPath = path;
                state = { ...state, ...updates };
            }
            renderApp();
        }

        function pushLog(text) {
            const stamp = new Date().toLocaleTimeString([], { hour12: false });
            state.pipelineLog.push(`${stamp}  ${text}`);
            renderApp();
        }

        async function runMockPipeline() {
            if (!state.agentInputText.trim()) return;
            state.processingPipeline = true;
            state.pipelineStage = 0; // drives the 5-node live agent visualization
            state.pipelineData = null;
            state.matchResult = null;
            state.dispatchResult = null;
            state.pipelineLog = [];
            renderApp();

            const wait = (ms) => new Promise(res => setTimeout(res, ms));

            pushLog('Reading message...');
            await wait(500);

            // --- Runs the real NLP → Matching → Dispatch pipeline server-side against SQLite ---
            let result;
            try {
                result = await apiPost('/pipeline/run', {
                    message: state.agentInputText,
                    lat: 28.7041,
                    lon: 77.1025,
                    spoil_hours_override: state.spoilHours,
                    freshness_score: state.freshnessResult
                        ? state.freshnessResult.score
                        : 0.9
                });
            }
            catch (e) {
                console.error(e);
            }

            if (!result || !result.surplus) {
                showToast('⚠ Pipeline failed — check that the backend is running at ' + API_BASE, 'red');
                state.processingPipeline = false;
                state.pipelineStage = 0;
                renderApp();
                return;
            }

            const surplus = result.surplus;

            // --- Stage 1: NLP Agent (real regex extraction, ran server-side in agents.py) ---
            state.pipelineStage = 1;
            pushLog(`NLP parsed → "${surplus.food_type}" · ${surplus.quantity_servings} servings · spoils in ${surplus.time_to_spoil_hours}h`);
            renderApp();
            await wait(650);

            // --- Stage 2: Food Safety Agent (uses the image-upload freshness scan if the user ran one) ---
            state.pipelineStage = 2;
            const freshnessNote = state.freshnessResult ? `Freshness ${state.freshnessResult.score}% (vision scan)` : 'No photo scanned — proceeding on reported spoil window';
            pushLog(`Food Safety Agent → ${freshnessNote}`);
            renderApp();
            await wait(600);

            // --- Stage 3: Matching Agent (real capacity + haversine distance logic, computed server-side) ---
            state.pipelineStage = 3;
            const matchRes = result.match;
            state.matchResult = matchRes;
            pushLog(matchRes.match_found ? `Matching Agent → ${matchRes.best_ngo_name} selected (${Math.round(matchRes.confidence_score * 100)}% confidence)` : 'Matching Agent → no eligible NGO node found');
            renderApp();
            await wait(650);

            if (!matchRes.match_found) {
                state.pipelineData = null;
                state.processingPipeline = false;
                state.pipelineStage = 0;
                await refreshFromBackend();
                return;
            }

            // --- Stage 4: Volunteer Dispatch Agent (real vehicle-capacity + distance logic, computed server-side) ---
            state.pipelineStage = 4;
            const dispatchRes = result.dispatch;
            state.dispatchResult = dispatchRes;
            pushLog(`Dispatch Agent → ${dispatchRes.assigned_volunteer_name} assigned (${dispatchRes.vehicle_type}), ETA ${dispatchRes.estimated_pickup_mins}m`);
            renderApp();
            await wait(600);

            // --- Stage 5: Forecast Agent (rolls this surplus into the neighborhood hotspot model) ---
            state.pipelineStage = 5;
            pushLog('Forecast Agent → future demand model updated');
            renderApp();
            await wait(500);

            state.pipelineData = {
                food_type: surplus.food_type,
                quantity: surplus.quantity_servings,
                assigned_volunteer: dispatchRes.assigned_volunteer_id,
                vehicle: dispatchRes.vehicle_type === 'car' ? 'Car / 4-Wheeler' : 'Electric Bike',
                target_ngo: matchRes.best_ngo_id,
                target_ngo_name: matchRes.best_ngo_name,
                eta_mins: dispatchRes.estimated_pickup_mins,
                urgency: matchRes.dispatch_urgency,
                confidence: matchRes.confidence_score,
                location_lat: surplus.location_lat,
                location_lon: surplus.location_lon
            };

            const newAlertId = result.alert_id;
            showToast(`🤖 Dispatch ${newAlertId} created → ${matchRes.best_ngo_name}`, 'emerald');

            // --- Re-sync everything (ledger, analytics, notifications) from SQLite, then pull this alert's timeline ---
            await refreshFromBackend();
            await loadHistoryFor(newAlertId);
            simulateDeliveryLifecycle(newAlertId); // advances the REAL backend status over time

            state.processingPipeline = false;
            state.pipelineStage = 0;
            renderApp();
        }

                                <div class="text-[9px] text-slate-500 font-bold mt-1">TOTAL FOOD SAVED (SERVINGS)</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-xl font-extrabold text-teal-400">${co2Saved.toLocaleString()} kg</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">CO₂ SAVED (EST.)</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-xl font-extrabold text-sky-400">${totalRescuedServings.toLocaleString()}</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">MEALS SERVED</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-xl font-extrabold text-amber-400">${successPct}%</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">DELIVERY SUCCESS RATE</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-xl font-extrabold text-blue-400">${avgEta || '—'} min</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">AVERAGE ETA</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-xl font-extrabold text-emerald-400">4.8 / 5</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">VOLUNTEER RATING (DEMO)</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-sm font-extrabold text-teal-400 truncate">${topNgo && topNgo.vol > 0 ? topNgo.n.name : '—'}</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">TOP NGO BY VOLUME</div>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-4 backdrop-blur">
                                <div class="text-xl font-extrabold text-amber-400">${aiDecisionsCount}</div>
                                <div class="text-[9px] text-slate-500 font-bold mt-1">TOTAL AI DECISIONS</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-6 backdrop-blur">
                                <h3 class="text-sm font-semibold text-emerald-400 mb-3">WEEKLY RESCUE VOLUME</h3>
                                <canvas id="chartWeekly" height="180"></canvas>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-6 backdrop-blur">
                                <h3 class="text-sm font-semibold text-cyan-400 mb-3">7-DAY DEMAND FORECAST (MODEL PROJECTION)</h3>
                                <canvas id="chartMonthly" height="180"></canvas>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-6 backdrop-blur">
                                <h3 class="text-sm font-semibold text-teal-400 mb-3">NGO CAPACITY UTILIZATION</h3>
                                <canvas id="chartNgoCapacity" height="180"></canvas>
                            </div>
                            <div class="glass-card bg-slate-900/80 border border-slate-800 rounded-xl p-6 backdrop-blur">
                                <h3 class="text-sm font-semibold text-sky-400 mb-3">VOLUNTEER FLEET AVAILABILITY</h3>
                                <canvas id="chartVolunteers" height="180"></canvas>
                            </div>
                        </div>
                        <p class="text-[9px] text-slate-600 text-center">Weekly / 7-day charts are illustrative trend projections seeded from the current ledger — wire the FastAPI backend's <code>/history</code> endpoint for real daily rollups.</p>
                    </div>
                `;
                initAnalyticsCharts();
                return;
            }
        }

        // --- Forecast dashboard cache: fetched from POST /predict/forecast (real trained model) ---
        let forecastResults = [];
        let forecastKeyFetched = null;
        async function updateForecast(requestedKey) {
            try {
                const results = await apiPost('/predict/forecast', {
                    hour: state.forecastHour, is_weekend: state.forecastWeekend, is_raining: state.forecastRaining
                });
                // Only apply if the user hasn't changed the sliders again while this was in flight
                if (requestedKey === (state.forecastHour + '|' + state.forecastWeekend + '|' + state.forecastRaining)) {
                    forecastResults = results;
                }
            } catch (e) {
                console.error('Forecast fetch failed, falling back to local heuristic', e);
                forecastResults = NEIGHBORHOODS.map(n => predictHotspot(n, state.forecastHour, state.forecastWeekend, state.forecastRaining));
            }
            if (state.currentPath === '/dashboard/forecast') renderApp();
        }

        // --- Chart.js instances (destroyed + rebuilt on every analytics render) ---
        let analyticsChartInstances = [];
        function initAnalyticsCharts() {
            if (typeof Chart === 'undefined') return;
            analyticsChartInstances.forEach(c => c.destroy());
            analyticsChartInstances = [];

            const gridColor = 'rgba(148,163,184,0.12)';
            const tickColor = '#94a3b8';
            const baseOpts = {
                plugins: { legend: { labels: { color: tickColor, font: { size: 10 } } } },
                scales: { x: { ticks: { color: tickColor, font: { size: 9 } }, grid: { color: gridColor } }, y: { ticks: { color: tickColor, font: { size: 9 } }, grid: { color: gridColor } } }
            };

            // Weekly Rescue Volume (bar) — seeded deterministically from the live total so it stays consistent per session
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const weeklyBase = Math.max(200, Math.round(totalRescuedServings / 7));
            const weeklyData = days.map((_, i) => Math.round(weeklyBase * (0.7 + 0.5 * Math.abs(Math.sin(i * 1.7 + totalRescuedServings)))));
            const c1 = document.getElementById('chartWeekly');
            if (c1) analyticsChartInstances.push(new Chart(c1, {
                type: 'bar',
                data: { labels: days, datasets: [{ label: 'Servings Rescued', data: weeklyData, backgroundColor: '#14B8A6', borderRadius: 6 }] },
                options: { ...baseOpts, plugins: { legend: { display: false } } }
            }));

            // 7-Day Demand Forecast (line) — aggregates the RandomForest-style hotspot model across all neighborhoods per day
            const forecastSeries = days.map((_, i) => {
                const isWeekend = i >= 5;
                const isRaining = i === 3;
                return NEIGHBORHOODS.reduce((s, n) => s + predictHotspot(n, 20, isWeekend, isRaining).predicted_servings, 0);
            });
            const c2 = document.getElementById('chartMonthly');
            if (c2) analyticsChartInstances.push(new Chart(c2, {
                type: 'line',
                data: { labels: days, datasets: [{ label: 'Predicted Surplus', data: forecastSeries, borderColor: '#3B82F6', backgroundColor: 'rgba(59,130,246,0.15)', fill: true, tension: 0.35, pointRadius: 3 }] },
                options: { ...baseOpts, plugins: { legend: { display: false } } }
            }));

            // NGO Capacity Utilization (doughnut)
            const ngoLabels = NETWORK_NGOS.map(n => n.name);
            const ngoUsed = NETWORK_NGOS.map(n => state.dispatches.filter(l => l.ngoId === n.ngo_id && l.status.startsWith('En-route')).reduce((s, l) => s + l.volume, 0));
            const c3 = document.getElementById('chartNgoCapacity');
            if (c3) analyticsChartInstances.push(new Chart(c3, {
                type: 'doughnut',
                data: { labels: ngoLabels, datasets: [{ data: ngoUsed.length && ngoUsed.some(v => v > 0) ? ngoUsed : NETWORK_NGOS.map(n => n.capacity_servings), backgroundColor: ['#22C55E', '#3B82F6', '#F59E0B', '#14B8A6'] }] },
                options: { plugins: { legend: { position: 'bottom', labels: { color: tickColor, font: { size: 9 }, boxWidth: 10 } } } }
            }));

            // Volunteer Fleet Availability (pie)
            const busyCount = FLEET_VOLUNTEERS.filter(v => state.dispatches.some(l => l.volunteerId === v.vol_id && l.status.startsWith('En-route'))).length;
            const idleCount = FLEET_VOLUNTEERS.length - busyCount;
            const c4 = document.getElementById('chartVolunteers');
            if (c4) analyticsChartInstances.push(new Chart(c4, {
                type: 'pie',
                data: { labels: ['Idle / Available', 'On Delivery'], datasets: [{ data: [idleCount, busyCount], backgroundColor: ['#22C55E', '#F59E0B'] }] },
                options: { plugins: { legend: { position: 'bottom', labels: { color: tickColor, font: { size: 9 }, boxWidth: 10 } } } }
            }));
        }

        renderApp(); // instant paint with in-memory defaults (zeros) while the backend responds
        refreshFromBackend(); // GET /ngos, /volunteers, /dispatch, /analytics/summary, /notifications → real repaint
    </script>
</body>
</html>
